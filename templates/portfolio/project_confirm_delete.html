{% extends "base.html" %}
{% block title %}
    Delete: {{ object.title }}
{% endblock %}
{% block content %}

<h1>Delete {{ object.title }}</h1>

<p>
  Are you sure you want to delete
  <strong>"{{ object.title }}"</strong>?
</p>

<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger m-2">Yes, delete</button>
  <a href="{% url 'portfolio:detail' object.pk %}" class="btn btn-success m-2">Cancel</a>
</form>

{% endblock %}
