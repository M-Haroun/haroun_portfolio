{% extends "base.html" %}
{% block title %}
 {% if object %}
    Edit: {{ object.title }}
  {% else %}
    Add Post
  {% endif %}
{% endblock %}
{% block content %}

<div class="card-header card-primary">
  <h1 class="card-title mb-0">
    {% if object %}
      Edit: {{ object.title }}
    {% else %}
      Add New Post
    {% endif %}
  </h1>
</div>


<div class='card-body'>
<form method="post">
  {% csrf_token %}

  {{ form.as_p }}
  <div class='card-footer'>
  <button type="submit" class='btn btn-success'>
    {% if object %}
      Update
    {% else %}
      Create
    {% endif %}
  </button>
  <a href="{% url 'blog:list' %}" class='btn btn-secondary'>Back to Posts</a>
</div>
</form>
</div>
{% endblock %}
