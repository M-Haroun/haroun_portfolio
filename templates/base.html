{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Portfolio{% endblock %}</title>
    <!-- IonIcons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Font: Source Sans Pro -->
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700" rel="stylesheet">
    <!--Bootstrap-->
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}" >
    <link rel="stylesheet" href="{% static 'dist/css/all.min.css' %}" >
    {% block extra_css %}{% endblock %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
            color: #333;
        }
        header {
            background-color: #222;
            padding: 15px 30px;
        }
        header a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
        header a:hover {
            text-decoration: underline;
        }
        .container1 {
            margin: 30px auto;
            padding: 20px;
            background: #fff;
            border-radius: 6px;
        }

        footer {
            color: #111;
        }
            footer a {
        transition: 0.3s;
        }

        footer a:hover {
            transform: translateY(-3px);
        }

        .bi-youtube:hover { color: #FF0000 !important; }
        .bi-linkedin:hover { color: #0A66C2 !important; }
        .bi-github:hover { color: #ffffff !important; }
        .bi-whatsapp:hover { color: #25D366 !important; }
        .bi-telegram:hover { color: #0088cc !important; }
        
        footer p {
        margin-top: 15px;
        margin-bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <a href="{% url 'index' %}">Home</a>
    <a href="{% url 'portfolio:list' %}">Portfolio</a>
    <a href="{% url 'blog:list' %}">Blogs</a>
    <a href="{% url 'contact:contact' %}">Contact Us</a>
    {% if user.is_authenticated %}
    <span style="color:#aaa;">Welcome, {{ user.username }}</span>
    <a href="{% url 'logout' %}">Logout</a>
    {% else %}
        <a href="{% url 'login' %}?next={{ request.path }}">Login</a>
    {% endif %}

</header>

<div class="container1 container">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-center text-white py-4 ">
    <div class="container">

        <!-- youtube -->
        <a href="https://youtube.com/c/harounschool" 
            target="_blank" 
            rel="noopener noreferrer"
            class="text-white me-3 fs-4">
            <i class="bi bi-youtube"></i>
        </a>

        <!-- linkedin -->
        <a href="https://www.linkedin.com/in/mahmoudharoun2" 
            target="_blank"
            rel="noopener noreferrer"
            class="text-white me-3 fs-4">
            <i class="bi bi-linkedin"></i>
        </a>
        
        <!-- GitHub -->
        <a href="https://github.com/M-Haroun"
           target="_blank"
           rel="noopener noreferrer"
           class="text-white me-3 fs-4">
            <i class="bi bi-github"></i>
        </a>

        <!-- WhatsApp -->
        <a href="https://wa.me/201146295028"
           target="_blank"
           rel="noopener noreferrer"
           class="text-white me-3 fs-4">
            <i class="bi bi-whatsapp"></i>
        </a>

        <!-- Telegram -->
        <a href="https://t.me/mahmoudharoun2"
           target="_blank"
           rel="noopener noreferrer"
           class="text-white fs-4">
            <i class="bi bi-telegram"></i>
        </a>
        <p>© {% now "Y" %} My Portfolio</p>
    </div>
</footer>

<!-- 
<script src="{% static 'dist/js/popper.min.js' %}"></script>
<script src="{% static 'bootstrap/js/bootstrap.js' %}"></script>
<script src="{% static 'dist/js/jquery-3.7.1.min.js' %}"></script>
-->
<script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
